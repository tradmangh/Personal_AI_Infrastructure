services:
  pai:
    # Removes default port bindings since Traefik will route traffic internally
    ports: []
    labels:
      - traefik.enable=true
      
      # 1. Define the domain (Replace pai.yourdomain.com with your domain)
      - traefik.http.routers.pai-terminal.rule=Host(`${FQDN:-pai.yourdomain.com}`)
      - traefik.http.services.pai-terminal.loadbalancer.server.port=8080
      
      # 2. IP Allowlist Middleware (Replace 10.8.0.0/24 with your WireGuard Subnet)
      - traefik.http.middlewares.vpn-only.ipallowlist.sourcerange=${VPN_SUBNET:-10.8.0.0/24}
      
      # 3. Apply the Middleware to the route
      - traefik.http.routers.pai-terminal.middlewares=vpn-only
