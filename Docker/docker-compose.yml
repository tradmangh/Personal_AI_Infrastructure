services:
  pai:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: pai
    ports:
      - "${BIND_IP:-127.0.0.1}:${BIND_PORT:-8082}:8082"
      - "${BIND_IP:-127.0.0.1}:${VOICE_PORT:-8888}:8888"
      - "${BIND_IP:-127.0.0.1}:${SSH_PORT:-2222}:22"
    environment:
      # --- App Configuration ---
      - ANTHROPIC_API_KEY
      - ELEVENLABS_API_KEY
      - PRINCIPAL_NAME
      - TIMEZONE
      - AI_NAME
      - CATCHPHRASE
      - TEMPERATURE_UNIT
      - ELEVENLABS_VOICE_ID
      - PAI_PASSWORD

      # --- Network & Security ---
      - BIND_IP
      - BIND_PORT
      - VOICE_PORT
      - SSH_PORT
      - FQDN
    volumes:
      # Comprehensive persistence for all PAI and Claude state
      - pai-claude:/home/pai/.claude
      - pai-config:/home/pai/.config
      - pai-local:/home/pai/.local
    restart: unless-stopped
    # Coolify Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pai.rule=Host(`${FQDN:-localhost}`)"
      - "traefik.http.services.pai.loadbalancer.server.port=8082"

volumes:
  pai-claude:
  pai-config:
  pai-local:
