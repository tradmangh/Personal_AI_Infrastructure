services:
  pai:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: pai
    ports:
      - "${BIND_IP:-127.0.0.1}:${BIND_PORT:-8082}:${BIND_PORT:-8082}"
      - "${BIND_IP:-127.0.0.1}:${VOICE_PORT:-8888}:8888"
      - "${BIND_IP:-127.0.0.1}:${SSH_PORT:-2222}:22"
    environment:
      # --- App Configuration ---
      - ANTHROPIC_API_KEY
      - ELEVENLABS_API_KEY
      - PRINCIPAL_NAME
      - TIMEZONE
      - AI_NAME
      - CATCHPHRASE
      - TEMPERATURE_UNIT
      - ELEVENLABS_VOICE_ID
      - PAI_PASSWORD

      # --- Network & Security ---
      - BIND_IP
      - BIND_PORT
      - VOICE_PORT
      - SSH_PORT
      - TRAEFIK_ENABLE
      - FQDN
      - VPN_SUBNET
    volumes:
      # We now persist the entire configuration directories
      - pai-claude:/home/pai/.claude
      - pai-config:/home/pai/.config
    restart: unless-stopped
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.pai.rule=Host(`${FQDN:-localhost}`)"
      - "traefik.http.services.pai.loadbalancer.server.port=${BIND_PORT:-8082}"
      - "traefik.http.middlewares.pai-filter.ipallowlist.sourcerange=${VPN_SUBNET:-127.0.0.1/32}"
      - "traefik.http.routers.pai.middlewares=pai-filter"

volumes:
  pai-claude:
  pai-config:
