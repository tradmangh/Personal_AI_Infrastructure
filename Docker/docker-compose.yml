services:
  pai:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: pai
    # BIND_IP: Default is 127.0.0.1 (Loopback) for security. 
    # Set to 0.0.0.0 to expose publicly, or 10.8.0.1 for a specific VPN interface.
    ports:
      - "${BIND_IP:-127.0.0.1}:${BIND_PORT:-8080}:8080"
      - "${BIND_IP:-127.0.0.1}:${VOICE_PORT:-8888}:8888"
    environment:
      # --- App Configuration ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - PRINCIPAL_NAME=${PRINCIPAL_NAME:-User}
      - TIMEZONE=${TIMEZONE:-UTC}
      - AI_NAME=${AI_NAME:-PAI}
      - CATCHPHRASE=${CATCHPHRASE:-Ready to go}
      - TEMPERATURE_UNIT=${TEMPERATURE_UNIT:-fahrenheit}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-pNInz6obpgDQGcFmaJgB}

      # --- Network Hints (Forces visibility in Coolify UI) ---
      - BIND_IP=${BIND_IP:-127.0.0.1}
      - BIND_PORT=${BIND_PORT:-8080}
      - VOICE_PORT=${VOICE_PORT:-8888}
      - TRAEFIK_ENABLE=${TRAEFIK_ENABLE:-false}
      - DOMAIN=${DOMAIN:-localhost}
      - VPN_SUBNET=${VPN_SUBNET:-127.0.0.1/32}
    volumes:
      - pai-memory:/home/pai/.claude/MEMORY
      - pai-user:/home/pai/.claude/USER
      - pai-config:/home/pai/.config/PAI
    restart: unless-stopped
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.pai.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.pai.loadbalancer.server.port=8080"
      # Security: Always apply the IP filter. 
      # Default: 127.0.0.1/32 (Blocked). 
      # Set VPN_SUBNET to your WireGuard range or 0.0.0.0/0 for public.
      - "traefik.http.middlewares.pai-filter.ipallowlist.sourcerange=${VPN_SUBNET:-127.0.0.1/32}"
      - "traefik.http.routers.pai.middlewares=pai-filter"

volumes:
  pai-memory:
  pai-user:
  pai-config:
